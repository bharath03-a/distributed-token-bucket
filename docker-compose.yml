services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  limiter:
    build: .
    ports:
      - "50051:50051"
    environment:
      REDIS_URL: redis://redis:6379
      LISTEN_ADDR: 0.0.0.0:50051
      DEFAULT_CAPACITY: 100
      DEFAULT_REFILL_RATE: 10.0
    depends_on:
      redis:
        condition: service_healthy
