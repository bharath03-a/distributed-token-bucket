syntax = "proto3";

package limiter;

// Rate limiter service - allows checking and consuming tokens.
service LimiterService {
  // Check if a request is allowed (consumes 1 token if allowed).
  rpc Allow(AllowRequest) returns (AllowResponse);
  // Set or update rate limit config for a key.
  rpc SetLimit(SetLimitRequest) returns (SetLimitResponse);
}

message AllowRequest {
  string key = 1;       // e.g. "user:123", "api:key-abc"
  uint32 tokens = 2;    // tokens to consume (default 1)
}

message AllowResponse {
  bool allowed = 1;
  string message = 2;  // e.g. "rate limited" when denied
}

message SetLimitRequest {
  string key = 1;
  uint64 capacity = 2;
  double refill_rate = 3;
}

message SetLimitResponse {
  bool ok = 1;
  string error = 2;
}
